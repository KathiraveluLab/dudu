version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: dudu-mongodb
    ports:
      - "27017:27017"
    volumes:
      - dudu-mongo-data:/data/db

  mysql:
    image: mysql:latest
    container_name: dudu-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: dudu_archive
    volumes:
      - dudu-mysql-data:/var/lib/mysql

volumes:
  dudu-mongo-data:
  dudu-mysql-data:
